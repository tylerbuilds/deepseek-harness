id: deepseek-harness
repo_path: /Users/tyler/Code/control-plane/deepseek-harness
owner: CommandCentreOps
service_class: engineering_harness
deploy_class: local_only
release_target: local_tool_or_cli
secret_policy: no_raw_secrets
proof_commands:
  quick:
    - npm run typecheck
    - npm test
  full:
    - npm run typecheck
    - npm test
docs:
  primary:
    - README.md
    - docs/sprint-plan.md
    - docs/agent-os-integration.md
    - docs/dispatch-integration.md
metrics_sources:
  - .state/deepseek-harness.sqlite
agent_lanes:
  read_only: true
  draft_only: true
  sandbox_prepare: true
  local_workspace_apply: false
  external_side_effects: manual_only
guardrails:
  canonical_state_write: false
  command_centre_state_write: false
  repo_apply: false
  github_write: false
  deploy: false
  publish: false
  live_deepseek_calls_require_approval_packet: true
