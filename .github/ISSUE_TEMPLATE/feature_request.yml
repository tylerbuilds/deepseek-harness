name: Feature request
description: Propose an improvement to the local-first harness.
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the workflow gap without including sensitive workload data.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: Include safety, cost, privacy and side-effect implications where relevant.
    validations:
      required: true
